services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      PROSPECTMAP_DB: /data/prospects.db
    volumes:
      - db_data:/data
    expose:
      - "8000"

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    environment:
      API_INTERNAL_URL: http://api:8000
      AUTH_USER: ${AUTH_USER}
      AUTH_PASS: ${AUTH_PASS}
    depends_on:
      - api
    expose:
      - "3000"

volumes:
  db_data:
